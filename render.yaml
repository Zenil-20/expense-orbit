services:
  - type: web
    name: expense-orbit-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: Expense Orbit
      - key: APP_NAME
        value: Expense Orbit
      - key: APP_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
